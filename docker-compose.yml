services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8002:8002"
    volumes:
      - .:/app
    entrypoint: ["sh", "-c", "sed -i 's/\r$//' /app/backend/entrypoint.sh && sh /app/backend/entrypoint.sh"]
    env_file:
      - path: .env
        required: false

  frontend:
    build: ./frontend
    ports:
      - "5175:5175"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    entrypoint: ["sh", "-c", "sed -i 's/\r$//' entrypoint.sh && sh ./entrypoint.sh"]
